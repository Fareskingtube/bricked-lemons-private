name: Bricked-Lemons

services:
  postgres:
    image: postgres:18
    container_name: postgres_db
    restart: always
    environment:
      - POSTGRES_USER=dev
      - POSTGRES_PASSWORD=dev
      - POSTGRES_DB=bricked_lemons_db
    ports:
      - "5433:5432"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend
    restart: always
    ports:
      - "5000:5000"
    depends_on:
      - postgres
    env_file:
      - ./backend/.env
    volumes:
      - "./backend:/backend"
      - "backend_node_modules:/backend/node_modules"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    restart: always
    ports:
      - "5173:5173"
    depends_on:
      - backend
    env_file:
      - ./frontend/.env
    volumes:
      - "./frontend:/frontend"
      - "frontend_node_modules:/frontend/node_modules"

volumes:
  backend_node_modules:
  frontend_node_modules:
